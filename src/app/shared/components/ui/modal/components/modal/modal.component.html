@if (isOpen) {
  <div
    [class]="wrapperClasses.join(' ')"
    [@modal]="'enter'"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="title ? 'modal-title' : null"
  >
    <!-- Backdrop -->
    @if (showBackdrop) {
      <div class="modal-backdrop" (click)="onBackdropClick($event)" aria-hidden="true"></div>
    }

    <!-- Modal Container -->
    <div
      #modalContainer
      [class]="containerClasses.join(' ')"
      [ngStyle]="containerStyles"
      role="document"
      cdkDrag
      [cdkDragDisabled]="!draggable"
      cdkDragBoundary=".modal-wrapper"
    >
      <!-- Header -->
      @if (title || showCloseButton) {
        <div
          class="modal-header"
          cdkDragHandle
          [style.cursor]="draggable ? 'move' : 'default'"
        >
          <div class="modal-header__content">
            @if (title) {
              <h2 id="modal-title" class="modal-header__title">
                {{ title }}
              </h2>
            }
            @if (subtitle) {
              <p class="modal-header__subtitle">
                {{ subtitle }}
              </p>
            }
          </div>

          <div class="modal-header__actions">
            @if (showMaximizeButton) {
              <button
                type="button"
                class="modal-header__action"
                (click)="toggleFullscreen($event)"
                [attr.aria-label]="isFullscreen ? 'Свернуть' : 'Развернуть'"
              >
                <av-icon [type]="isFullscreen ? 'actions/av_compress' : 'actions/av_expand'" [size]="18"></av-icon>
              </button>
            }

            @if (showCloseButton) {
              <button
                type="button"
                class="modal-header__close"
                (click)="close()"
                aria-label="Закрыть"
              >
                <av-icon type="actions/av_close" [size]="20"></av-icon>
              </button>
            }
          </div>
        </div>
      }

      <!-- Body -->
      <div class="modal-body">
        <ng-content select="[modal-body]"></ng-content>
      </div>

      <!-- Footer -->
      <div class="modal-footer" [class.modal-footer--loading]="loading">
        <!-- Loading Overlay -->
        @if (loading) {
          <div class="modal-footer__loading">
            <div class="spinner"></div>
            <span>Загрузка...</span>
          </div>
        }

        <ng-content select="[modal-footer]"></ng-content>
      </div>

      <!-- Resize Handle -->
      @if (resizable) {
        <div class="modal-resize-handle" (mousedown)="onResizeMouseDown($event)"></div>
      }
    </div>
  </div>
}
